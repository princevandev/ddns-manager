<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            surface: {
              900: '#0a0a0f',
              800: '#12121a',
              700: '#1a1a24',
              600: '#22222e',
            },
            brand: {
              primary: '#2563eb',
              secondary: '#3b82f6',
              accent: '#f97316',
              success: '#10b981',
            }
          }
        }
      }
    }
  </script>
  <title>DDNS Manager - 域名管理</title>
  <style>
    body { font-family: 'Fira Sans', sans-serif; }
    .font-mono { font-family: 'Fira Code', monospace; }
  </style>
</head>
<body class="bg-surface-900 text-slate-100 min-h-screen">
  {% raw %}
  <!-- Top Tab Bar -->
  <nav class="bg-surface-800 border-b border-surface-700 px-4 py-3 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-1">
        <a href="/" class="flex items-center gap-2 py-2 px-4 text-slate-400 hover:text-slate-200 hover:bg-surface-700 rounded-xl transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
          </svg>
          <span class="font-medium">机器</span>
        </a>
        <a href="/domains" class="flex items-center gap-2 py-2 px-4 text-brand-primary bg-brand-primary/10 rounded-xl">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
          </svg>
          <span class="font-medium">域名</span>
        </a>
        <a href="/settings" class="flex items-center gap-2 py-2 px-4 text-slate-400 hover:text-slate-200 hover:bg-surface-700 rounded-xl transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="font-medium">设置</span>
        </a>
      </div>
      <!-- User Avatar with Dropdown -->
      <div class="relative group">
        <button class="w-9 h-9 rounded-full bg-brand-primary/20 flex items-center justify-center text-brand-primary font-semibold hover:bg-brand-primary/30 transition-colors">
          A
        </button>
        <div class="absolute right-0 top-full mt-2 w-48 bg-surface-800 border border-surface-700 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
          <div class="px-4 py-3 border-b border-surface-700">
            <div class="text-sm font-medium">admin</div>
            <div class="text-xs text-slate-500">管理员</div>
          </div>
          <a href="/logout" class="flex items-center gap-2 px-4 py-3 text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-colors rounded-b-xl">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            退出登录
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-6" id="app">
    <!-- Add Domain -->
    <div class="bg-surface-800 border border-surface-700 rounded-2xl p-5 mb-6">
      <h2 class="text-lg font-medium mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-brand-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
        添加域名
      </h2>
      <form @submit.prevent="addDomain" class="grid sm:grid-cols-4 gap-3">
        <select v-model="machineId" class="bg-surface-700 border border-surface-600 rounded-xl p-3 text-slate-100 focus:outline-none focus:border-brand-primary transition-colors">
          <option disabled value="">选择机器</option>
          <option v-for="m in machines" :value="m.id">{{ m.name }}</option>
        </select>
        <input 
          v-model="domain" 
          class="bg-surface-700 border border-surface-600 rounded-xl p-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand-primary transition-colors"
          placeholder="example.com"
        />
        <input 
          v-model="zoneId" 
          class="bg-surface-700 border border-surface-600 rounded-xl p-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand-primary transition-colors"
          placeholder="Zone ID (可选)"
        />
        <button class="bg-brand-primary hover:bg-brand-secondary text-white font-medium rounded-xl transition-colors duration-200">
          添加
        </button>
      </form>
    </div>

    <!-- Domains List -->
    <div class="bg-surface-800 border border-surface-700 rounded-2xl p-5">
      <h2 class="text-lg font-medium mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-brand-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
        </svg>
        所有域名
      </h2>
      <div v-if="domains.length" class="space-y-3">
        <div v-for="domain in domains" :key="domain.id" class="bg-surface-700/50 rounded-xl p-4 flex items-center justify-between">
          <div>
            <div class="font-mono text-lg">{{ domain.domain_name }}</div>
            <div class="text-sm text-slate-500 mt-1 flex items-center gap-4">
              <span>Machine ID: {{ domain.machine_id }}</span>
              <span v-if="domain.zone_id">Zone: {{ domain.zone_id }}</span>
              <span v-if="domain.last_ip" class="text-brand-success">IP: {{ domain.last_ip.substring(0, 20) }}...</span>
            </div>
          </div>
          <button @click="deleteDomain(domain.id)" class="text-slate-500 hover:text-red-400 p-2 rounded-lg hover:bg-red-500/10 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>
      <div v-else class="text-center py-12">
        <div class="w-16 h-16 rounded-2xl bg-surface-700 flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
          </svg>
        </div>
        <h3 class="text-lg font-medium text-slate-300 mb-2">暂无域名</h3>
        <p class="text-slate-500 text-sm">添加第一个域名开始使用</p>
      </div>
    </div>

    <!-- Toast -->
    <div v-if="message" class="fixed bottom-6 right-6 bg-surface-700 border border-surface-600 px-4 py-3 rounded-xl shadow-xl flex items-center gap-2">
      <svg class="w-4 h-4 text-brand-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
      {{ message }}
    </div>
  </div>

  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          machines: [],
          domains: [],
          machineId: '',
          domain: '',
          zoneId: '',
          message: ''
        }
      },
      mounted() {
        this.loadMachines()
        this.loadDomains()
      },
      methods: {
        async loadMachines() {
          const res = await fetch('/api/machines')
          this.machines = await res.json()
        },
        async loadDomains() {
          const res = await fetch('/api/domains')
          this.domains = await res.json()
        },
        async addDomain() {
          if (!this.machineId || !this.domain.trim()) return
          const form = new FormData()
          form.append('machine_id', this.machineId)
          form.append('domain_name', this.domain.trim())
          if (this.zoneId.trim()) {
            form.append('zone_id', this.zoneId.trim())
          }
          const res = await fetch('/api/domains', { method: 'POST', body: form })
          if (res.ok) {
            this.domain = ''
            this.zoneId = ''
            this.message = '域名添加成功'
            await this.loadDomains()
            setTimeout(() => this.message = '', 3000)
          } else {
            const data = await res.json()
            this.message = data.detail || '添加失败'
            setTimeout(() => this.message = '', 3000)
          }
        },
        async deleteDomain(id) {
          if (!confirm('确定删除此域名？')) return
          const res = await fetch(`/api/domains/${id}`, { method: 'DELETE' })
          if (res.ok) {
            this.message = '域名已删除'
            await this.loadDomains()
            setTimeout(() => this.message = '', 3000)
          }
        }
      }
    }).mount('#app')
  </script>
  {% endraw %}
</body>
</html>
