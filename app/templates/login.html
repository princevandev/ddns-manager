<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            surface: {
              900: '#0a0a0f',
              800: '#12121a',
              700: '#1a1a24',
              600: '#22222e',
            },
            brand: {
              primary: '#2563eb',
              secondary: '#3b82f6',
              accent: '#f97316',
            }
          }
        }
      }
    }
  </script>
  <title>DDNS Manager</title>
  <style>
    body { font-family: 'Fira Sans', sans-serif; }
    .font-mono { font-family: 'Fira Code', monospace; }
  </style>
</head>
<body class="bg-surface-900 text-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo/Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-primary/10 mb-4">
        <svg class="w-8 h-8 text-brand-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight">DDNS Manager</h1>
      <p class="text-slate-500 text-sm mt-1">Cloudflare DDNS 管理面板</p>
    </div>

    <!-- Login Card -->
    <div class="bg-surface-800 border border-surface-700 rounded-2xl p-6 shadow-xl shadow-black/20">
      {% if error %}
      <div class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">用户名</label>
          <input 
            name="username" 
            class="w-full bg-surface-700 border border-surface-600 rounded-xl p-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-colors"
            placeholder="请输入用户名"
            autocomplete="username"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">密码</label>
          <input 
            type="password" 
            name="password" 
            class="w-full bg-surface-700 border border-surface-600 rounded-xl p-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-brand-primary focus:ring-1 focus:ring-brand-primary transition-colors"
            placeholder="请输入密码"
            autocomplete="current-password"
          />
        </div>
        <button class="w-full bg-brand-primary hover:bg-brand-secondary text-white font-medium p-3 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          登录
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-slate-600 text-xs mt-6">
      Powered by Cloudflare API
    </p>
  </div>
</body>
</html>
